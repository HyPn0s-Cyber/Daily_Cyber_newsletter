name: Envoi de l'infolettre quotidienne

on:
  schedule:
    # 9h00 Montréal en heure d'été (EDT) = 13h00 UTC
    # heure d'hiver (EST), changez '0 13 * * *' par '0 14 * * *'
    - cron: '0 13 * * *' 
  workflow_dispatch: # Permet lancement manuel

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Exécuter le script Python
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: python infolettre.py